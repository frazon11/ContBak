name: Bug report
description: Report a reproducible ContBak problem
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: ContBak version
      placeholder: 1.2.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Synology DSM 7, Debian 13, Ubuntu...
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description and reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
