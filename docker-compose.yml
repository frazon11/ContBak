services:
  dockback:
    build: .
    container_name: DockBack
    restart: unless-stopped
    ports:
      - "8787:8080"
    environment:
      TZ: ${TZ}
      DOCKBACK_USER: ${DOCKBACK_USER}
      DOCKBACK_PASSWORD: ${DOCKBACK_PASSWORD}
      BACKUP_ROOT: ${BACKUP_ROOT}
      BACKUP_HOST_PATH: ${BACKUP_HOST_PATH}
      HELPER_IMAGE: ${HELPER_IMAGE}
      STOP_CONTAINERS: ${STOP_CONTAINERS}
      RETENTION_COUNT: ${RETENTION_COUNT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker/dockback/config:/data
      - /volume1/docker/dockback/backups:/backups
